
<!DOCTYPE HTML><html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP Web Server</title>
  <style>
    html {font-family: Arial; display: inline-block; text-align: center;}
    h2 {font-size: 2.3rem;}
    p {font-size: 1.9rem;}
    body {max-width: 400px; margin:0px auto; padding-bottom: 25px;}
    .slider { -webkit-appearance: none; margin: 14px; width: 360px; height: 25px; background: #FFD65C;
      outline: none; -webkit-transition: .2s; transition: opacity .2s;}
    .slider::-webkit-slider-thumb {-webkit-appearance: none; appearance: none; width: 35px; height: 35px; background: #003249; cursor: pointer;}
    .slider::-moz-range-thumb { width: 35px; height: 35px; background: #003249; cursor: pointer; } 
    button {font-size:32px; padding:10px; background-color:green; }
    button:hover {background-color:black; color:white;}
  </style>
</head>
<body>
  <h2>ESP Web Server</h2>
  <p><span  id="textSliderValue0">0</span></p>
  <p><input style="background-color:red;" type="range" onchange="updateSliderPWM(this,0)" min="0" max="255" value="0" step="1" class="slider"></p>
  <p><span id="textSliderValue1">0</span></p>
  <p><input style="background-color:green;" type="range" onchange="updateSliderPWM(this,1)" min="0" max="255" value="0" step="1" class="slider"></p>
  <p><span id="textSliderValue2">0</span></p>
  <p><input style="background-color:blue;" type="range" onchange="updateSliderPWM(this,2)" min="0" max="255" value="0" step="1" class="slider"></p>
  <p><span id="textSliderValue3">0</span></p>

  <p><input style="background-color:red;" type="range" onchange="updateSliderPWM(this,3)" min="0" max="255" value="0" step="1" class="slider"></p>
  <p><span id="textSliderValue4">0</span></p>
  <p><input style="background-color:green;" type="range" onchange="updateSliderPWM(this,4)" min="0" max="255" value="0" step="1" class="slider"></p>
  <p><span id="textSliderValue5">0</span></p>
  <p><input style="background-color:blue;" type="range" onchange="updateSliderPWM(this,5)" min="0" max="255" value="0" step="1" class="slider"></p>

  <p><span id="textSliderValue6">0</span></p>
  <p><input  type="range" onchange="updateSliderPWM(this,6)" min="0" max="255" value="0" step="1" class="slider"></p>
  <p><span id="textSliderValue7">0</span></p>
  <p><input  type="range" onchange="updateSliderPWM(this,7)" min="0" max="255" value="0" step="1" class="slider"></p>
   <p><span id="textSliderValue8">0</span></p>
  <p><input  type="range" onchange="updateSliderPWM(this,8)" min="0" max="255" value="0" step="1" class="slider"></p>
  <p><span id="textSliderValue9">0</span></p>
  <p><input  type="range" onchange="updateSliderPWM(this,9)" min="0" max="255" value="0" step="1" class="slider"></p>

  <p><button onclick="setFreq(10)">10 Hz</button></p>
  <p><button onclick="setFreq(20)">20 Hz</button></p>
  <p><button onclick="setFreq(50)">50 Hz</button></p>
  <p><button onclick="setFreq(200)">200 Hz</button></p>
  <p><button onclick="setFreq(500)">500 Hz</button></p>
  <p><button onclick="setFreq(1000)">1000 Hz</button></p>


<script>
function updateSliderPWM(element,id) {
  const sliderValue = element.value;
  document.getElementById("textSliderValue"+id).innerHTML = sliderValue;
  console.log(sliderValue);

  fetch("8.8.4.4/slider?value="+sliderValue+"&id="+id,{
    method:"GET"
  })
}

function getPWMValues()
{
 
    fetch("8.8.4.4/sliderget",{
      method:"GET"
    })
    .then(
      res =>{
        res.headers.forEach((key,value)=>{
            
          if(Number.isInteger(key) && Number.isInteger(value))
          {
          console.log(key);
          const element=document.getElementById("textSliderValue"+key);
          if(element!==null)
          {
          element.innerHTML = value;
          }

          }
        });
        
      }
    )
    
}

function setFreq(freq)
{
  fetch("8.8.4.4/setfreq?value="+freq,{
    method:"GET"
  })
}

getPWMValues();

</script>
</body>
</html>
