<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ LED</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        button {
            border: black solid 2px;
            background-color: crimson;
            padding: 10px;
            font-size: medium;
        }

        button:hover {
            background-color: black;
            color: white;
            cursor: pointer;
        }

        button:active {
            color: black;
        }

        .duty_slider {
            appearance: slider-vertical;
            height: fit-content;
        }

        .freq_slider {
            width: fit-content;
            height: fit-content;
        }

        main {
            display: flex;
            flex-direction: row;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            height: fit-content;
            justify-content: center;
            gap: 10px;
        }

        .led_control {
            height: 50px;
            width: 100%;
            border-width: 3px;
            border-color: black;
            border-style: solid;
            background-color: rgb(226, 225, 225);

            animation-name: blink;
            animation-duration: 0;
            animation-iteration-count: infinite;
            animation-timing-function: step-start;
        }

        .led {
            border-color: black;
            border-width: 5px;
            border-style: solid;
            border-radius: 50%;
            width: 10vw;
            height: 10vw;
        }

        .led:hover
        {
            border-color: gray;
            border-width: 8px;
        }

        .led_view
        {
            display: flex;
            height: 100%;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            gap: 4vw;
        }

        .led_container
        {
            justify-content: center;
            align-items: center;   
        }

        .led_container > h3
        {
            text-align: center;
        }


        footer {
            text-align: center;
            width: 100%;
        }

        body {
            width: 100vw;
            height: 100vh;
        }

        header
        {
            margin-top: auto;
        }

        @media screen and (max-width:600px) {
            footer {
                display: none;
            }
            .led_view
            {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="led_container">
        <h3 id="chose">Wybier kolor</h3>
        <main class="led_view">

        </main>
    </div>
</body>
<script>

    const colors = [
            // black
            [0.0,0.0,0.0],
            // white
            [1.0,1.0,1.0],
            // red
            [1.0,0.0,0.0],
            // green
            [0.0,1.0,0.0],
            // blue
            [0.0,0.0,1.0],
            // yellow
            [1.0,1.0,0.0],
        ];

    function startUp() {
        const main = document.getElementsByTagName("main")[0];

        colors.forEach((color,index,arr)=>{
            console.log("Color: ",color);

            const red = Math.floor(color[0]*255);
            const green = Math.floor(color[1]*255);
            const blue = Math.floor(color[2]*255);

            const styleColor = `rgb(${red},${green},${blue})`;

            main.innerHTML += `
            <div id="${index}" class="led"
            style="background-color:${styleColor}"
            onclick="onLedClick(${index})">
            </div>
            `;

        });

        updateAllDuty(0.0);
        updateAllFreq(0.0);
    }

    function onLedClick(id)
    {
        const colorId = parseInt(id);

        const color = colors[colorId]; 

        const red = color[0]*100.0;  
        const green = color[1]*100.0;  
        const blue = color[2]*100.0;  

        setTextColor(color);

        // red channels
        sendDuty(0,red);
        sendDuty(3,red);
        sendDuty(6,red);

        // green channels
        sendDuty(1,green);
        sendDuty(4,green);
        sendDuty(7,green);

        // blue channels
        sendDuty(2,blue);
        sendDuty(5,blue);
        sendDuty(8,blue);
    }

    function setTextColor(color)
    {
        const red = Math.floor(color[0]*255);
        const green = Math.floor(color[1]*255);
        const blue = Math.floor(color[2]*255);

        const text = document.getElementById("chose");

        const styleColor = `rgb(${red},${green},${blue})`;

        text.style.color = styleColor; 
    }

    function sendDuty(channel,value)
    {
        const request = new XMLHttpRequest();
        request.open("GET", `/led/duty/?id=${channel}&value=${value}`, false);
        request.send(null);
    }

    function sendFreq(channel,value)
    {
        const request = new XMLHttpRequest();
        request.open("GET", `/led/freq/?id=${channel}&value=${value}`, false);
        request.send(null);
    }

    function updateDuty(channel, value) {

        sendDuty(channel,value);
    }

    function updateFreq(channel, value) {

        sendFreq(channel,value);
    }

    function updateAllDuty(value) {
        for (let i = 0; i < 13; i++) {
            updateDuty(i, value);
        }
    }

    function updateAllFreq(value) {
        for (let i = 0; i < 13; i++) {
            updateFreq(i, value);
        }
    }

    startUp();

</script>

</html>
